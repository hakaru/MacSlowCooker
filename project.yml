name: MacSlowCooker
options:
  bundleIdPrefix: com.macslowcooker
  xcodeVersion: "16.0"
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: K38MBRNKAT
    CODE_SIGN_STYLE: Automatic

targets:
  MacSlowCooker:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MacSlowCooker
        excludes:
          - "Library/**"
      - path: Shared
    resources:
      - path: MacSlowCooker/Library
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macslowcooker.app
        INFOPLIST_FILE: MacSlowCooker/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacSlowCooker/MacSlowCooker.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: HelperTool
        embed: false
    postBuildScripts:
      - name: "Copy HelperTool to MacOS and plist to LaunchDaemons"
        script: |
          MACOS_DEST="${CODESIGNING_FOLDER_PATH}/Contents/MacOS"
          PLIST_DEST="${CODESIGNING_FOLDER_PATH}/Contents/Library/LaunchDaemons"
          mkdir -p "${MACOS_DEST}" "${PLIST_DEST}"
          HELPER_SRC="${BUILT_PRODUCTS_DIR}/HelperTool"
          if [ -f "${HELPER_SRC}" ]; then
            cp "${HELPER_SRC}" "${MACOS_DEST}/HelperTool"
          fi
          PLIST_SRC="${SRCROOT}/MacSlowCooker/Library/LaunchDaemons/com.macslowcooker.helper.plist"
          if [ -f "${PLIST_SRC}" ]; then
            cp "${PLIST_SRC}" "${PLIST_DEST}/com.macslowcooker.helper.plist"
          fi
        basedOnDependencyAnalysis: false

  HelperTool:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: HelperTool
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macslowcooker.helper
        INFOPLIST_FILE: HelperTool/Info.plist
        CODE_SIGN_ENTITLEMENTS: HelperTool/HelperTool.entitlements
        OTHER_LDFLAGS: "-sectcreate __TEXT __info_plist $(INFOPLIST_FILE)"

  MacSlowCookerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MacSlowCookerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macslowcooker.tests
    dependencies:
      - target: MacSlowCooker
