name: GPUSMI
options:
  bundleIdPrefix: com.gpusmi
  xcodeVersion: "16.0"
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  GPUSMI:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: GPUSMI
        excludes:
          - "Library/**"
      - path: Shared
    resources:
      - path: GPUSMI/Library
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gpusmi.app
        INFOPLIST_FILE: GPUSMI/Info.plist
        CODE_SIGN_ENTITLEMENTS: GPUSMI/GPUSMI.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: HelperTool
        embed: false
    postBuildScripts:
      - name: "Copy HelperTool to LaunchDaemons"
        script: |
          HELPER_SRC="${BUILT_PRODUCTS_DIR}/HelperTool"
          DEST="${CODESIGNING_FOLDER_PATH}/Contents/Library/LaunchDaemons"
          mkdir -p "${DEST}"
          if [ -f "${HELPER_SRC}" ]; then
            cp "${HELPER_SRC}" "${DEST}/HelperTool"
          fi
        basedOnDependencyAnalysis: false

  HelperTool:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: HelperTool
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gpusmi.helper
        INFOPLIST_FILE: HelperTool/Info.plist
        CODE_SIGN_ENTITLEMENTS: HelperTool/HelperTool.entitlements

  GPUSMITests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: GPUSMITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gpusmi.tests
    dependencies:
      - target: GPUSMI
